<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Player Pro V6.0 (Ultra-Stealth)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Inter', system-ui, sans-serif;
        }
        #container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        iframe {
            border: none;
            width: 100%;
            height: 100%;
            background-color: #000;
        }
        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 48px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 1000;
            color: white;
            opacity: 0;
            transition: opacity 0.3s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        #top-bar:hover {
            opacity: 1;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 8px #22c55e;
        }
        .btn {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #38bdf8;
            color: #38bdf8;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            margin-right: 8px;
        }
        #loading {
            position: absolute;
            color: white;
            z-index: 500;
        }
    </style>
</head>
<body>
    <div id="top-bar">
        <div>
            <span class="status-dot"></span>
            <strong>Ultra-Stealth Active</strong>
        </div>
        <div>
            <button class="btn-outline" id="btn-reload">Sync & Reload</button>
            <button class="btn" id="btn-close">Close Player</button>
        </div>
    </div>
    <div id="container">
        <div id="loading">Initializing Stream Bypass...</div>
        <iframe id="player-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation allow-downloads" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture" style="opacity:0; transition: opacity 0.5s;"></iframe>
    </div>

    <script src="player.js"></script>
</body>
</html>
